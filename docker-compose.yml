services:
  ghost:
    image: ghost:latest
    ports:
      - "2368:2368"
    environment:
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      url: http://localhost:2368
      # Mail Configuration for local testing
      mail__transport: SMTP
      mail__options__host: maildev
      mail__options__port: 1025
    volumes:
      # Use a NAMED Docker volume for content (much more stable on Windows for SQLite)
      - ghost_content:/var/lib/ghost/content
      # Keep the theme bind-mount so we can test the local files
      - ./content/themes/mytheme:/var/lib/ghost/content/themes/mytheme
    depends_on:
      - maildev

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  ghost_content: